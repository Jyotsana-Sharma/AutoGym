run_name: xgb_ranker_v5
candidate_name: xgb_ranker
experiment_name: autogym-recipe-ranking
random_seed: 42

data:
  train_path: "train.csv"
  validation_path: "val.csv"
  test_path: "test.csv"

training:
  group_key: user_id
  label_column: label
  objective: rank:ndcg
  learning_rate: 0.2
  n_estimators: 40
  max_depth: 2
  min_child_weight: 4.0
  subsample: 0.6
  colsample_bytree: 0.6
  reg_lambda: 4.0
  eval_metric: ndcg@10
  tree_method: hist
