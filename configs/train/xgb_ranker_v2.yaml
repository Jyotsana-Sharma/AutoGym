run_name: xgb_ranker_v2
candidate_name: xgb_ranker
experiment_name: autogym-recipe-ranking
random_seed: 42

data:
  train_path: "train.csv"
  validation_path: "val.csv"
  test_path: "test.csv"

training:
  group_key: user_id
  label_column: label
  objective: rank:ndcg
  learning_rate: 0.1
  n_estimators: 120
  max_depth: 4
  min_child_weight: 2.0
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 2.0
  eval_metric: ndcg@10
  tree_method: hist
