run_name: xgb_ranker_v3
candidate_name: xgb_ranker
experiment_name: autogym-recipe-ranking
random_seed: 42

data:
  train_path: "train.csv"
  validation_path: "val.csv"
  test_path: "test.csv"

training:
  group_key: user_id
  label_column: label
  objective: rank:ndcg
  learning_rate: 0.03
  n_estimators: 320
  max_depth: 8
  min_child_weight: 1.0
  subsample: 0.95
  colsample_bytree: 1.0
  reg_lambda: 0.5
  eval_metric: ndcg@10
  tree_method: hist
