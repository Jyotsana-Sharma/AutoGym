run_name: xgb_ranker_v4
candidate_name: xgb_ranker
experiment_name: autogym-recipe-ranking
random_seed: 42

data:
  train_path: "train.csv"
  validation_path: "val.csv"
  test_path: "test.csv"

training:
  group_key: user_id
  label_column: label
  objective: rank:ndcg
  learning_rate: 0.15
  n_estimators: 80
  max_depth: 3
  min_child_weight: 3.0
  subsample: 0.7
  colsample_bytree: 0.7
  reg_lambda: 3.0
  eval_metric: ndcg@10
  tree_method: hist
