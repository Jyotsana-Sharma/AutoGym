run_name: xgb_ranker_v6
candidate_name: xgb_ranker
experiment_name: autogym-recipe-ranking
random_seed: 42

data:
  train_path: "train.csv"
  validation_path: "val.csv"
  test_path: "test.csv"

training:
  group_key: user_id
  label_column: label
  objective: rank:ndcg
  learning_rate: 0.3
  n_estimators: 10
  max_depth: 1
  min_child_weight: 8.0
  subsample: 0.5
  colsample_bytree: 0.5
  reg_lambda: 8.0
  eval_metric: ndcg@10
  tree_method: hist
