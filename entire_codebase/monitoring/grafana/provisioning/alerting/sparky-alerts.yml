apiVersion: 1

contactPoints:
  - orgId: 1
    name: retrain-api-rollback
    receivers:
      - uid: retrain-api-rollback-webhook
        type: webhook
        settings:
          url: http://retrain-api:8080/alerts/rollback
          httpMethod: POST
          authorization_scheme: Bearer
          authorization_credentials: ${ROLLBACK_WEBHOOK_TOKEN}
          maxAlerts: "0"

policies:
  - orgId: 1
    receiver: retrain-api-rollback
    group_by: ["grafana_folder", "alertname"]
    routes:
      - receiver: retrain-api-rollback
        object_matchers:
          - ["severity", "=", "critical"]

groups:
  - orgId: 1
    name: sparky-serving-rollback
    folder: SparkyFitness
    interval: 1m
    rules:
      - uid: sparky-high-error-rate
        title: HighErrorRate
        condition: C
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Serving error rate is above 5%.
          description: Grafana can notify the retrain API rollback webhook when this critical alert fires.
        labels:
          severity: critical
          alertname: HighErrorRate
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: rate(http_requests_total{job="sparky-serving",status=~"5.."}[5m]) / rate(http_requests_total{job="sparky-serving"}[5m])
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
