global:
  resolve_timeout: 5m
  smtp_smarthost: "localhost:25"
  smtp_from: "sparky-alerts@your-domain.com"

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: warning-alerts
      repeat_interval: 4h
    - match:
        severity: info
      receiver: info-alerts
      repeat_interval: 24h

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://retrain-api:8080/alerts"
        send_resolved: true

  - name: "critical-alerts"
    webhook_configs:
      - url: "http://retrain-api:8080/alerts"
        send_resolved: true
    # Uncomment and configure for Slack notifications:
    # slack_configs:
    #   - api_url: "${SLACK_WEBHOOK_URL}"
    #     channel: "#sparky-alerts"
    #     title: "CRITICAL: {{ .CommonAnnotations.summary }}"
    #     text: "{{ .CommonAnnotations.description }}"

  - name: "warning-alerts"
    webhook_configs:
      - url: "http://retrain-api:8080/alerts"
        send_resolved: true

  - name: "info-alerts"
    webhook_configs:
      - url: "http://retrain-api:8080/alerts"
        send_resolved: false

inhibit_rules:
  # Don't fire warning if critical is already firing for same service
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["job"]
