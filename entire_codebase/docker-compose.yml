# SparkyFitness ML System — Unified docker-compose
# All services share a single build context (repository root).
# Usage:
#   docker compose --profile pipeline up -d   → ONE COMMAND: full pipeline (data→train→serve+monitor)
#   make run-all               → full system
#   docker compose --profile serving up -d
#   docker compose --profile monitoring up -d

version: "3.9"

networks:
  sparky-net:
    driver: bridge
    # Mark as external so SparkyFitness's docker-compose can join it:
    #   networks:
    #     sparky-net:
    #       external: true
    # Then set ML_RECOMMENDATION_URL=http://sparky-serving:8000 in SparkyFitness env.

volumes:
  postgres-data:
  mlflow-db:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:
  models-cache:
  training-data:

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: sparky
  POSTGRES_USER: sparky
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparky_pass}
  MLFLOW_TRACKING_URI: http://mlflow:5000
  OS_AUTH_URL: ${OS_AUTH_URL:-}
  OS_APPLICATION_CREDENTIAL_ID: ${OS_APPLICATION_CREDENTIAL_ID:-}
  OS_APPLICATION_CREDENTIAL_SECRET: ${OS_APPLICATION_CREDENTIAL_SECRET:-}
  OS_REGION_NAME: ${OS_REGION_NAME:-CHI@TACC}

services:
  # =========================================================================
  # INFRASTRUCTURE
  # =========================================================================

  postgres:
    image: postgres:15-alpine
    container_name: sparky-postgres
    restart: unless-stopped
    networks: [sparky-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/data/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./configs/data/init_feedback.sql:/docker-entrypoint-initdb.d/02_feedback.sql
    environment:
      POSTGRES_DB: sparky
      POSTGRES_USER: sparky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparky_pass}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparky -d sparky"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
      target: mlflow
    container_name: sparky-mlflow
    restart: unless-stopped
    networks: [sparky-net]
    volumes:
      - mlflow-db:/app/local/mlflow
      - mlflow-artifacts:/app/local/mlartifacts
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  # DATA PIPELINE
  # =========================================================================

  data-generator:
    build:
      context: .
      dockerfile: Dockerfile
      target: data
    container_name: sparky-data-generator
    networks: [sparky-net]
    profiles: ["data", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      serving:
        condition: service_healthy
    volumes:
      - ./output:/output
      - training-data:/training-data
    environment:
      <<: *common-env
      ML_RECOMMENDATION_URL: http://sparky-serving:8000
      PRODUCTION_TRAFFIC_CSV: /training-data/test.csv
      PRODUCTION_FEATURES_CSV: /training-data/train.csv
    command: python src/data/data_generator.py --rate 1.0 --days 7
    restart: unless-stopped

  batch-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: data
    container_name: sparky-batch-pipeline
    networks: [sparky-net]
    profiles: ["data", "retrain", "full", "pipeline"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./output:/output
      - training-data:/training-data
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://sparky:${POSTGRES_PASSWORD:-sparky_pass}@postgres:5432/sparky
      OUTPUT_PATH: /training-data
    command: >
      sh -c "python src/data/batch_pipeline.py --raw-dir /data --output-dir /output &&
             cp /output/train.csv /training-data/train.csv &&
             cp /output/val.csv /training-data/val.csv &&
             cp /output/test.csv /training-data/test.csv &&
             cp /output/manifest.json /training-data/manifest.json"

  drift-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: data
    container_name: sparky-drift-monitor
    networks: [sparky-net]
    profiles: ["monitoring", "full", "pipeline"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./output:/output
      - training-data:/training-data
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://sparky:${POSTGRES_PASSWORD:-sparky_pass}@postgres:5432/sparky
      RETRAIN_WEBHOOK_URL: http://retrain-api:8080/trigger
      DRIFT_THRESHOLD: "0.05"
      CHECK_INTERVAL_SECONDS: "300"
      TRAINING_BASELINE_PATH: /training-data/train.csv
    command: python src/data/drift_monitor.py --loop

  # =========================================================================
  # TRAINING PIPELINE
  # =========================================================================

  trainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: training
    container_name: sparky-trainer
    networks: [sparky-net]
    profiles: ["retrain", "full", "pipeline"]
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
      batch-pipeline:
        condition: service_completed_successfully
    volumes:
      - training-data:/training-data
      - mlflow-artifacts:/app/local/mlartifacts
      - models-cache:/models
    environment:
      <<: *common-env
      TRAIN_CSV: /training-data/train.csv
      VAL_CSV: /training-data/val.csv
      TEST_CSV: /training-data/test.csv
      NDCG_THRESHOLD: "0.55"
      MODEL_EXPORT_PATH: /models/xgboost_ranker.json
    command: python -m src.training.retrain_pipeline --config configs/training/xgb_ranker.yaml

  retrain-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: training
    container_name: sparky-retrain-api
    networks: [sparky-net]
    profiles: ["monitoring", "full", "pipeline"]
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - training-data:/training-data
      - mlflow-artifacts:/app/local/mlartifacts
      - models-cache:/models
    environment:
      <<: *common-env
      TRAIN_CSV: /training-data/train.csv
      VAL_CSV: /training-data/val.csv
      TEST_CSV: /training-data/test.csv
      NDCG_THRESHOLD: "0.55"
      MODEL_EXPORT_PATH: /models/xgboost_ranker.json
    ports:
      - "8080:8080"
    command: python -m src.training.retrain_api

  # =========================================================================
  # SERVING
  # =========================================================================

  serving:
    build:
      context: .
      dockerfile: Dockerfile
      target: serving
    container_name: sparky-serving
    networks: [sparky-net]
    profiles: ["serving", "full", "pipeline"]
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
      trainer:
        condition: service_completed_successfully
    volumes:
      - models-cache:/models
      - mlflow-artifacts:/app/local/mlartifacts
      - ./output/enriched_recipes.csv:/data/enriched_recipes.csv:ro
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://sparky:${POSTGRES_PASSWORD:-sparky_pass}@postgres:5432/sparky
      LOG_PREDICTIONS: "true"
      MODEL_FALLBACK_PATH: /models/xgboost_ranker.json
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  # MONITORING STACK
  # =========================================================================

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sparky-prometheus
    networks: [sparky-net]
    profiles: ["monitoring", "full", "pipeline"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sparky-alertmanager
    networks: [sparky-net]
    profiles: ["monitoring", "full", "pipeline"]
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sparky-grafana
    networks: [sparky-net]
    profiles: ["monitoring", "full", "pipeline"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sparky_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on: [prometheus]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: sparky-postgres-exporter
    networks: [sparky-net]
    profiles: ["monitoring", "full", "pipeline"]
    environment:
      DATA_SOURCE_NAME: "postgresql://sparky:${POSTGRES_PASSWORD:-sparky_pass}@postgres:5432/sparky?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
