run_name: xgb_ranker_ray_v1
candidate_name: xgb_ranker
experiment_name: autogym-recipe-ranking-ray
random_seed: 42

data:
  train_path: "train.csv"
  validation_path: "val.csv"
  test_path: "test.csv"

training:
  group_key: user_id
  label_column: label
  objective: rank:ndcg
  learning_rate: 0.05
  n_estimators: 200
  max_depth: 6
  min_child_weight: 1.0
  subsample: 0.9
  colsample_bytree: 0.9
  reg_lambda: 1.0
  eval_metric: ndcg@10
  tree_method: hist

ray:
  num_workers: 3
  cpus_per_worker: 2
  storage_path: "/app/local/ray_results/autogym"
  checkpoint_frequency: 25
  max_failures: 1
  simulate_worker_failure: false
  failure_epoch: 50
